function esc(v){ return String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function go(route){ location.hash = "#/" + route; render(); window.scrollTo(0,0); }
window.go = go;

function listen(name, fallback, cb){
  let q;
  try { q = query(collection(db, name), orderBy("order","asc")); }
  catch { q = collection(db, name); }
  return onSnapshot(q, snap => {
    const data = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    cb(data.length ? data : fallback);
  }, err => { console.error(err); cb(fallback); });
}

function route(){ return location.hash.replace("#/","") || "home"; }
window.addEventListener("hashchange", render);

function clearSubs(){ unsub.forEach(fn => fn && fn()); unsub = []; }

  clearSubs();

}

function manageSettings(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>예약/카카오/인스타 링크 설정</h2><p class="notice">인스타그램은 자동 피드 연동 대신 버튼과 스타일 사진 게시물 링크 방식입니다. 공식 API 없이 자동 피드는 막히거나 불안정할 수 있어요.</p><form class="form" id="settingsForm"><input name="naverUrl" placeholder="네이버 예약/플레이스 링크"><input name="kakaoUrl" placeholder="카카오톡 상담 링크"><input name="instagramUrl" placeholder="인스타그램 주소"><input name="phone" placeholder="전화번호 예: 02-000-0000"><button class="primary">저장</button></form><div id="settingsSaved"></div></section>`;
  const form=document.getElementById("settingsForm");
  unsub.push(listen("settings", [], items=>{ const i=items[0]||{}; ["naverUrl","kakaoUrl","instagramUrl","phone"].forEach(k=>form[k].value=i[k]||""); }));
  form.onsubmit=async e=>{ e.preventDefault(); const fd=new FormData(form); await setDoc(doc(db,"settings","main"), Object.fromEntries(fd.entries()), {merge:true}); document.getElementById("settingsSaved").innerHTML='<p class="ok">저장되었습니다.</p>'; };
}

function manageReviews(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>리뷰 추가/수정</h2><p class="notice">네이버 리뷰 자동 수집은 공식 API 없이 하면 문제가 될 수 있어서, 여기서는 직접 선별한 리뷰를 등록하는 방식입니다.</p><form class="form adminForm" id="reviewForm"><input name="title" placeholder="제목 예: 컬러 상담이 꼼꼼했어요"><input name="name" placeholder="작성자 예: 네이버 방문자"><input name="rating" type="number" min="1" max="5" placeholder="별점 1~5" value="5"><input name="date" placeholder="날짜 예: 2026.07"><input name="link" placeholder="원문 링크 선택"><textarea name="body" placeholder="리뷰 내용"></textarea><button class="primary">리뷰 등록</button></form><div id="reviewAdminList"></div></section>`;
  const form = document.getElementById("reviewForm");
  form.onsubmit = async e => {
    e.preventDefault();
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());
    data.rating = Number(data.rating)||5;
    data.order = Date.now();
    await addDoc(collection(db,"reviews"), {...data, createdAt:serverTimestamp()});
    form.reset();
  };
  unsub.push(listen("reviews", [], items => {
    document.getElementById("reviewAdminList").innerHTML = adminList("reviews", items, false);
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteDoc(doc(db,"reviews",b.dataset.del)));
  }));
}

function manageStats(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>방문자 통계 안내</h2><div class="statGrid"><div class="stat"><b>GA4</b><p>구글 애널리틱스 연결 가능</p></div><div class="stat"><b>검색</b><p>네이버 서치어드바이저 등록 추천</p></div><div class="stat"><b>리뷰</b><p>관리자 등록 리뷰 표시</p></div></div><p class="notice">정확한 방문자 통계는 Google Analytics GA4 측정 ID를 추가해야 합니다. 필요하면 다음 버전에서 GA4 입력칸을 만들어줄 수 있습니다.</p></section>`;
}


function initVisitorCounter(){
  const box=document.getElementById("visitorBox");
  const todayKey="visit_"+new Date().toISOString().slice(0,10);
  const totalKey="visit_total";
  let today=Number(localStorage.getItem(todayKey)||0);
  let total=Number(localStorage.getItem(totalKey)||0);
  if(!sessionStorage.getItem("countedVisit")){ today++; total++; localStorage.setItem(todayKey,today); localStorage.setItem(totalKey,total); sessionStorage.setItem("countedVisit","yes"); }
  const current=Math.max(1, Math.floor(2+Math.random()*5));
  box.innerHTML=`<b>현재 ${current}명</b><br>오늘 ${today}명 · 누적 ${total}명`;
}
initVisitorCounter();

render();
</script>
